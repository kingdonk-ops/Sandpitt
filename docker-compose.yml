version: "3.9"

# =============================================================================
# Sandpitt Inspection System — Docker Compose
# =============================================================================
# Start everything:   docker compose up -d
# Rebuild api/admin:  docker compose up -d --build api admin
# Stop everything:    docker compose down
# Destroy volumes:    docker compose down -v
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sandpitt}
      POSTGRES_USER: ${POSTGRES_USER:-sandpitt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      # Create a second database for Metabase
      POSTGRES_MULTIPLE_DATABASES: metabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sandpitt} -d ${POSTGRES_DB:-sandpitt}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage for photos)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    logging: *default-logging

  # MinIO bucket creation (one-shot init container)
  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-changeme_minio_secret};
        mc mb --ignore-existing local/${MINIO_BUCKET_PHOTOS:-inspection-photos};
        mc anonymous set download local/${MINIO_BUCKET_PHOTOS:-inspection-photos};
        echo 'MinIO buckets ready';
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme_minio_secret}
      MINIO_BUCKET_PHOTOS: ${MINIO_BUCKET_PHOTOS:-inspection-photos}

  # ---------------------------------------------------------------------------
  # Keycloak (Identity & Access Management)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme_keycloak_admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sandpitt}
      KC_DB_USERNAME: ${POSTGRES_USER:-sandpitt}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Metabase (Analytics / Reporting)
  # ---------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:v0.49.10
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${MB_DB_USER:-metabase}
      MB_DB_PASS: ${MB_DB_PASS:-changeme_metabase}
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase-data
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sandpitt:changeme_postgres@postgres:5432/sandpitt}
      SECRET_KEY: ${SECRET_KEY:-changeme_super_secret_key_min_32_chars}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sandpitt}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-sandpitt-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme_keycloak_secret}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/sandpitt/protocol/openid-connect/certs}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme_minio_secret}
      MINIO_BUCKET_PHOTOS: ${MINIO_BUCKET_PHOTOS:-inspection-photos}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:19006}
      API_DEBUG: ${API_DEBUG:-true}
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Next.js Admin UI
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme_nextauth_secret}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-sandpitt}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-sandpitt-admin}
    ports:
      - "3000:3000"
    depends_on:
      - api
    logging: *default-logging

volumes:
  postgres_data:
  minio_data:
  metabase_data:

networks:
  default:
    name: sandpitt_network
